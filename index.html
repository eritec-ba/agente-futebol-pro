<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ Agente Futebol Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>⚽ Agente de Análise Esportiva</h1>
    <p class="subtitle">Análise das últimas 10 partidas + Confrontos Diretos</p>

    <div class="form">
      <input type="text" id="timeCasa" placeholder="Time da Casa (ex: Flamengo)" required>
      <input type="text" id="timeFora" placeholder="Time de Fora (ex: Palmeiras)" required>
      <button onclick="analisarPartida()">🔍 Analisar Partida</button>
    </div>

    <div id="resultado"></div>
    <div id="historico"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
